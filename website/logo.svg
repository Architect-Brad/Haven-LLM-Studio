<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="tower" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#a371f7"/>
    </linearGradient>
    <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="beam2" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#a371f7;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#a371f7;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Base / Rock -->
  <path d="M156 420 L156 380 L356 380 L356 420 Z" fill="#30363d"/>
  <path d="M140 420 L156 420 L356 420 L372 420 L372 440 L140 440 Z" fill="#21262d"/>

  <!-- Tower Body -->
  <path d="M196 380 L216 180 L296 180 L316 380 Z" fill="url(#tower)"/>

  <!-- Tower Stripes -->
  <path d="M206 320 L306 320 L308 300 L204 300 Z" fill="#0d1117" opacity="0.3"/>
  <path d="M212 260 L300 260 L302 240 L210 240 Z" fill="#0d1117" opacity="0.3"/>
  <path d="M218 200 L294 200 L296 180 L216 180 Z" fill="#0d1117" opacity="0.3"/>

  <!-- Lantern Room (Top) -->
  <rect x="206" y="140" width="100" height="40" rx="4" fill="#0d1117" stroke="#58a6ff" stroke-width="2"/>

  <!-- Light Source -->
  <circle cx="256" cy="160" r="12" fill="#58a6ff">
    <animate attributeName="r" values="12;14;12" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="256" cy="160" r="6" fill="#f0f6fc"/>

  <!-- Roof -->
  <path d="M200 140 L256 100 L312 140 Z" fill="#21262d" stroke="#30363d" stroke-width="1"/>

  <!-- Left Beam -->
  <polygon points="206,160 20,120 20,200" fill="url(#beam)">
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="3s" repeatCount="indefinite"/>
  </polygon>

  <!-- Right Beam -->
  <polygon points="306,160 492,120 492,200" fill="url(#beam2)">
    <animate attributeName="opacity" values="0.9;0.6;0.9" dur="3s" repeatCount="indefinite"/>
  </polygon>

  <!-- Circuit Pattern in Beam (Left) -->
  <line x1="120" y1="140" x2="140" y2="140" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>
  <line x1="140" y1="140" x2="140" y2="160" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>
  <circle cx="140" cy="160" r="2" fill="#58a6ff" opacity="0.4"/>

  <line x1="80" y1="150" x2="100" y2="150" stroke="#58a6ff" stroke-width="1" opacity="0.3"/>
  <line x1="100" y1="150" x2="100" y2="170" stroke="#58a6ff" stroke-width="1" opacity="0.3"/>
  <circle cx="100" cy="170" r="2" fill="#58a6ff" opacity="0.3"/>

  <!-- Circuit Pattern in Beam (Right) -->
  <line x1="372" y1="140" x2="392" y2="140" stroke="#a371f7" stroke-width="1" opacity="0.4"/>
  <line x1="392" y1="140" x2="392" y2="160" stroke="#a371f7" stroke-width="1" opacity="0.4"/>
  <circle cx="392" cy="160" r="2" fill="#a371f7" opacity="0.4"/>

  <line x1="412" y1="150" x2="432" y2="150" stroke="#a371f7" stroke-width="1" opacity="0.3"/>
  <line x1="432" y1="150" x2="432" y2="170" stroke="#a371f7" stroke-width="1" opacity="0.3"/>
  <circle cx="432" cy="170" r="2" fill="#a371f7" opacity="0.3"/>

  <!-- Stars -->
  <circle cx="80" cy="60" r="1.5" fill="#f0f6fc" opacity="0.6"/>
  <circle cx="420" cy="80" r="1" fill="#f0f6fc" opacity="0.4"/>
  <circle cx="100" cy="100" r="1" fill="#f0f6fc" opacity="0.5"/>
  <circle cx="400" cy="50" r="1.5" fill="#f0f6fc" opacity="0.5"/>
  <circle cx="60" cy="200" r="1" fill="#f0f6fc" opacity="0.3"/>
  <circle cx="450" cy="220" r="1" fill="#f0f6fc" opacity="0.3"/>
</svg>
